<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
    .header { background: #4CAF50; color: white; padding: 10px; text-align: center; border-radius: 10px 10px 0 0; }
    .content { padding: 20px; }
    .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Pembayaran Berhasil!</h1></div>
    <div class="content">
      <p>Halo {{farmerName}},</p>
      <p>Pesanan dengan ID <strong>{{orderId}}</strong> telah berhasil dibayar oleh pembeli.</p>
      <p><strong>Total Dana:</strong> Rp {{totalAmount}}</p>
      <p>Silakan segera siapkan barang dan hubungi kurir untuk pengiriman.</p>
    </div>
    <div class="footer">
      &copy; 2026 SmartTani. Semua hak dilindungi.
    </div>
  </div>
</body>
</html>
