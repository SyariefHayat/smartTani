<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
    .header { background: #2196F3; color: white; padding: 10px; text-align: center; border-radius: 10px 10px 0 0; }
    .content { padding: 20px; }
    .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
    .code { font-size: 24px; font-weight: bold; background: #f4f4f4; padding: 10px; letter-spacing: 5px; text-align: center; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Verifikasi Email Anda</h1></div>
    <div class="content">
      <p>Halo {{name}},</p>
      <p>Gunakan kode verifikasi di bawah ini untuk mengonfirmasi alamat email Anda:</p>
      <div class="code">{{verificationCode}}</div>
      <p>Atau klik link berikut:</p>
      <p><a href="{{verificationLink}}">{{verificationLink}}</a></p>
      <p>Kode ini berlaku selama 24 jam.</p>
    </div>
    <div class="footer">
      &copy; 2026 SmartTani. Semua hak dilindungi.
    </div>
  </div>
</body>
</html>
