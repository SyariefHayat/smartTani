<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { width: 80%; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
    .header { background: #2196F3; color: white; padding: 10px; text-align: center; border-radius: 10px 10px 0 0; }
    .content { padding: 20px; }
    .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>Barang Sudah Terkirim!</h1></div>
    <div class="content">
      <p>Halo {{buyerName}},</p>
      <p>Kabar gembira! Pesanan Anda dengan ID <strong>{{orderId}}</strong> telah sampai di tujuan.</p>
      <p>Silakan konfirmasi penerimaan barang di aplikasi jika sudah Anda terima dengan baik.</p>
      <p>Terima kasih telah berbelanja di SmartTani!</p>
    </div>
    <div class="footer">
      &copy; 2026 SmartTani. Semua hak dilindungi.
    </div>
  </div>
</body>
</html>
